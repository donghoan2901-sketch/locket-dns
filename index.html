<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cài DNS chặn thu hồi Gold</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 320px;
            width: 100%;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h2 {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 600;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background: #007AFF;
            color: white;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:active {
            transform: scale(0.96);
            background: #0055CC;
        }
        .note {
            font-size: 11px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📱</div>
        <h2>Cài DNS chặn thu hồi Gold</h2>
        <p>Bấm nút bên dưới để cài đặt cấu hình DNS.</p>
        <a href="https://raw.githubusercontent.com/donghoan2901-sketch/locket-dns/main/locket.mobileconfig" class="btn" download>⬇️ Cài đặt ngay</a>
        <p class="note">Sau khi bấm, chọn "Cho phép" → vào Cài đặt → Chung → VPN & Quản lý thiết bị → Cài đặt</p>
    </div>
</body>
</html>
